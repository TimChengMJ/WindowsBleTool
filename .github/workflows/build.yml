name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WindowsBleTool.sln

      - name: Build BleCore
        run: dotnet build src/BleCore/BleCore.csproj --no-restore -warnaserror

      - name: Build CLI
        run: dotnet build src/BleTool.Cli/BleTool.Cli.csproj --no-restore -warnaserror

      - name: Run tests
        run: dotnet test tests/BleCore.Tests/BleCore.Tests.csproj --verbosity normal

      # GUI build skipped: WinUI 3 XamlCompiler.exe crashes on windows-latest runner
      # Same issue occurs locally on Windows 11 Insider build 10.0.26200
      # Tracked at: WinAppSDK + .NET 9/10 XAML Markup Compiler incompatibility
