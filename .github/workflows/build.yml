name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WindowsBleTool.sln

      - name: Build BleCore
        run: dotnet build src/BleCore/BleCore.csproj --no-restore -warnaserror

      - name: Build CLI
        run: dotnet build src/BleTool.Cli/BleTool.Cli.csproj --no-restore -warnaserror

      - name: Build GUI
        run: dotnet build src/BleTool.Gui/BleTool.Gui.csproj --no-restore -warnaserror

      - name: Run BleCore unit tests
        run: dotnet test tests/BleCore.Tests/BleCore.Tests.csproj --verbosity normal

      - name: Build CLI integration tests
        run: dotnet build tests/Cli.Tests/Cli.Tests.csproj --no-restore

      - name: Run CLI integration tests
        run: dotnet test tests/Cli.Tests/Cli.Tests.csproj --no-build --verbosity normal

      - name: Publish CLI (win-x64)
        run: dotnet publish src/BleTool.Cli/BleTool.Cli.csproj -c Release -r win-x64 -o publish/BleTool.Cli --self-contained true -p:PublishSingleFile=true

      - name: Publish GUI (win-x64)
        run: dotnet publish src/BleTool.Gui/BleTool.Gui.csproj -c Release -r win-x64 -o publish/BleTool.Gui --self-contained true

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsBleTool-CLI
          path: publish/BleTool.Cli/BleTool.Cli.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsBleTool-GUI
          path: publish/BleTool.Gui/

      - name: Create Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: nightly-${{ github.run_number }}
          tag_name: nightly-${{ github.run_number }}
          files: |
            publish/BleTool.Cli/BleTool.Cli.exe
            publish/BleTool.Gui/BleTool.Gui.exe
          prerelease: true
          generate_release_notes: true
